name: 🐋 Docker ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '30 17 * * FRI'
  workflow_dispatch:
    inputs:
      docker-image:
        description: 'docker image name to build it'
        required: false
        type: string
        default: 'test-ci-nodeApp:latest'

jobs:
  ci-docker:
    name: 'ci docker build'
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: ${{ inputs.docker-image || 'test-ci-nodeApp:latest' }} 

    steps:
      - uses: actions/checkout@v4
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.1.0


      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: ./sample-app
          push: false
          tags: ${{ env.DOCKER_IMAGE}}:${{ github.sha }}

