name: 🐋 Docker ci reusable workflow 

on:
  workflow_call:
    inputs:
      docker-image:
        description: 'docker image name to build it'
        required: false
        type: string
        default: 'test-ci-nodeapp'
    secrets:
      TOKEN_GHCR:
        description: 'token to authenticate to ghcr'
        required: true
  

jobs:
  ci-docker:
    name: 'ci docker build'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_IMAGE: ${{ inputs.docker-image || 'test-ci-nodeapp' }} 

    steps:
      - uses: actions/checkout@v4
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.TOKEN_GHCR }}

      - name: Set image owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./sample-app
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.OWNER_LC  }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC  }}/${{ env.DOCKER_IMAGE }}:latest
